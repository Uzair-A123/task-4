<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">

        <!-- Left Section -->
        <div class="left">

            <!-- Logo -->
            <div class="logo">f</div>

            <div class="left-content">

                <!-- Text -->
                <div class="text-area">
                    <h1>
                        Explore<br>
                        The<br>
                        Things<br>
                        <span>You love.</span>
                    </h1>
                </div>

        <div class="image-area">
            <img src="img.webp" alt="Facebook Image">
        </div>

            </div>

        </div>

        <!-- Right Section -->
        <div class="right">

            <div class="login-box">

                <h2>Log in to Facebook</h2>

                <input
                    type="email"
                    placeholder="Email address or mobile number"
                    required
                >

                <input
                    type="password"
                    placeholder="Password"
                    required
                >

                <button class="login-btn">
                    Log in
                </button>

                <a href="forgot-password.html">
                    Forgotten password?
                </a>

                <button class="create-btn">
                    Create new account
                </button>

            </div>

        </div>

    </div>

</body>
</html>
